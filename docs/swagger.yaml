    type: object
  profile.ProfileResponse:
    properties:
      age:
        type: integer
      display_name:
        type: string
      preferred_locale:
        type: string
      status:
        type: string
      user_id:
        type: string
    type: object
  profile.ReferralCodeResponse:
    properties:
      code:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: API Server for Your Persona psychological assessment platform.
  title: Your Persona API
  version: "1.0"
paths:
  /healthz:
    get:
      description: |-
        Checks connectivity to PostgreSQL and Redis, the two dependencies used synchronously
        by nearly every endpoint. Used by container orchestration / load balancers.
      produces:
      - application/json
      responses:
        "200":
          description: All checked dependencies are healthy
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "503":
          description: One or more dependencies are unreachable — see data.checks
          schema:
            $ref: '#/definitions/httpresponse.Response'
      summary: Health check
      tags:
      - Operational
  /v1/account/delete-request:
    post:
      description: |-
        Starts a 14-day grace period. The account remains fully usable during this window —
        use `/account/delete-request/cancel` any time before the grace period ends to abort.

        Once the grace period elapses, a background worker anonymizes personal data
        (email, display name, essay answers, AI summary) and deletes stored PDFs.
        Aggregate data (mbti_type, grit_score) is retained.
      produces:
      - application/json
      responses:
        "200":
          description: Grace period started
          schema:
            allOf:
            - $ref: '#/definitions/httpresponse.Response'
            - properties:
                data:
                  $ref: '#/definitions/deletionrequest.RequestDeletionResponse'
              type: object
        "401":
          description: UNAUTHORIZED | TOKEN_VERSION_MISMATCH
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "409":
          description: DELETION_ALREADY_REQUESTED — an active request already exists
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "500":
          description: INTERNAL_ERROR — unexpected server error
          schema:
            $ref: '#/definitions/httpresponse.Response'
      security:
      - BearerAuth: []
      summary: Request account deletion
      tags:
      - Account
  /v1/account/delete-request/cancel:
    post:
      description: |-
        Aborts an in-progress grace period — only works while the request is still
        `pending_grace`. Once the anonymization worker has started, it's too late to cancel.
      produces:
      - application/json
      responses:
        "200":
          description: Deletion request cancelled
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "401":
          description: UNAUTHORIZED | TOKEN_VERSION_MISMATCH
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "404":
          description: NO_ACTIVE_DELETION_REQUEST — nothing to cancel
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "409":
          description: DELETION_ALREADY_PROCESSING — grace period already elapsed
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "500":
          description: INTERNAL_ERROR — unexpected server error
          schema:
            $ref: '#/definitions/httpresponse.Response'
      security:
      - BearerAuth: []
      summary: Cancel a pending account deletion request
      tags:
      - Account
  /v1/account/profile:
    patch:
      consumes:
      - application/json
      description: |-
        Updates `display_name`/`age`/`status`/`preferred_locale` — send only the fields you want to change.
        Used both to change locale from settings and to complete a profile for members who
        registered without ever having a `GUEST_SESSION`.
      parameters:
      - description: Fields to update (all optional)
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateProfileRequestDTO'
      produces:
      - application/json
      responses:
        "200":
          description: Profile updated
          schema:
            allOf:
            - $ref: '#/definitions/httpresponse.Response'
            - properties:
                data:
                  $ref: '#/definitions/profile.ProfileResponse'
              type: object
        "400":
          description: VALIDATION_ERROR — an included field has an invalid value
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "401":
          description: UNAUTHORIZED | TOKEN_VERSION_MISMATCH
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "500":
          description: INTERNAL_ERROR — unexpected server error
          schema:
            $ref: '#/definitions/httpresponse.Response'
      security:
      - BearerAuth: []
      summary: Update account profile (partial update)
      tags:
      - Account
  /v1/account/referral-code:
    get:
      description: |-
        Returns the caller's referral code, generating and persisting one on the very first request.
        Subsequent calls always return the same code — one code per user, never rotated.
      produces:
      - application/json
      responses:
        "200":
          description: Referral code
          schema:
            allOf:
            - $ref: '#/definitions/httpresponse.Response'
            - properties:
                data:
                  $ref: '#/definitions/profile.ReferralCodeResponse'
              type: object
        "401":
          description: UNAUTHORIZED | TOKEN_VERSION_MISMATCH
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "500":
          description: INTERNAL_ERROR — unexpected server error
          schema:
            $ref: '#/definitions/httpresponse.Response'
      security:
      - BearerAuth: []
      summary: Get (or generate) my referral code
      tags:
      - Account
  /v1/assessment/submit:
    post:
      consumes:
      - application/json
      description: |-
        Guest-or-Member endpoint (Auth: Optional). Member identity is taken from the Bearer
        access token if present (set by AuthMiddleware.OptionalAuth); otherwise falls back to
        the `session_id` Guest cookie. Runs the AI analysis synchronously — expect 3-8s latency.
      parameters:
      - description: Client-generated UUIDv4, replayed to dedupe retries
        in: header
        name: Idempotency-Key
        required: true
        type: string
      - description: Locale + answer set
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.SubmitRequestDTO'
      produces:
      - application/json
      responses:
        "200":
          description: Assessment result
          schema:
            allOf:
            - $ref: '#/definitions/httpresponse.Response'
            - properties:
                data:
                  $ref: '#/definitions/assessment.SubmitResponse'
              type: object
        "400":
          description: VALIDATION_ERROR — missing Idempotency-Key, malformed body,
            or neither session_id cookie nor access token present
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "409":
          description: IDEMPOTENCY_KEY_REUSED — same key replayed with a different
            payload
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "423":
          description: LOCK_NOT_ACQUIRED — a submission for this identity is already
            in flight
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "429":
          description: QUOTA_EXCEEDED — monthly submission quota reached
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "500":
          description: INTERNAL_ERROR — unexpected server error
          schema:
            $ref: '#/definitions/httpresponse.Response'
      summary: Submit assessment answers
      tags:
      - Assessment
  /v1/auth/change-password:
    post:
      consumes:
      - application/json
      description: |-
        Changes the password of the currently logged-in account by verifying `old_password`.
        `retry_new_password` must exactly match `new_password`.

        On success:
        - ALL existing sessions on every device are revoked (same as `/auth/reset-password`).
        - A fresh `access_token` + `refresh_token` pair is returned for THIS device so the caller isn't logged out.

        The new password follows the same policy as registration: minimum 10 characters and
        checked against known breach databases.
      parameters:
      - description: Old password, new password, and confirmation
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ChangePasswordRequestDTO'
      produces:
      - application/json
      responses:
        "200":
          description: Password changed. New session issued for this device.
          schema:
            allOf:
            - $ref: '#/definitions/httpresponse.Response'
            - properties:
                data:
                  $ref: '#/definitions/auth.ChangePasswordResponse'
              type: object
        "400":
          description: VALIDATION_ERROR | PASSWORD_TOO_SHORT | PASSWORD_BREACHED |
            PASSWORD_CONFIRMATION_MISMATCH
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "401":
          description: UNAUTHORIZED | INVALID_CREDENTIALS — access token invalid,
            or old_password is incorrect
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "500":
          description: INTERNAL_ERROR — unexpected server error
          schema:
            $ref: '#/definitions/httpresponse.Response'
      security:
      - BearerAuth: []
      summary: Change password (authenticated)
      tags:
      - Auth
  /v1/auth/forgot-password:
    post:
      consumes:
      - application/json
      description: |-
        Sends a 6-digit password reset OTP to the given email address.

        **Anti-enumeration:** this endpoint ALWAYS returns the same generic 200 response,
        whether or not the email is registered. Do not use it to probe for accounts.

        **Rate limiting:** 60-second cooldown + max 5 requests per 24 hours per email
        (separate budget from `/auth/resend-email-otp`). When throttled, the response
        includes `meta.retry_after_seconds`.

        Flow: `/forgot-password` → `/verify-reset-otp` → `/reset-password`.

        **cf_turnstile_response** — required. The token returned by the Cloudflare Turnstile
        widget after the user completes the challenge.
      parameters:
      - description: Account email
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ForgotPasswordRequestDTO'
      produces:
      - application/json
      responses:
        "200":
          description: Generic response — OTP sent if the email is registered
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "400":
          description: VALIDATION_ERROR | TURNSTILE_VERIFICATION_FAILED — email missing,
            or bot verification failed
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "429":
          description: RATE_LIMITED — check meta.retry_after_seconds
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "500":
          description: INTERNAL_ERROR — unexpected server error
          schema:
            $ref: '#/definitions/httpresponse.Response'
      summary: Request a password reset OTP (step 1 of 3)
      tags:
      - Auth
  /v1/auth/login:
    post:
      consumes:
      - application/json
      description: |-
        Authenticates a registered and verified member account.
        Returns a short-lived `access_token` (JWT) and a long-lived `refresh_token`.

        **Account lockout:**
        After **10 consecutive failed attempts**, the account is temporarily locked for **15 minutes**.
        The locked response includes `meta.locked_until` (RFC 3339 timestamp) indicating when the
        lock expires. Attempting to log in during a lockout will continue returning HTTP 423.

        The email must be verified before login is permitted.

        **cf_turnstile_response** — required. The token returned by the Cloudflare Turnstile
        widget after the user completes the challenge.
      parameters:
      - description: Email and password credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequestDTO'
      produces:
      - application/json
      responses:
        "200":
          description: Login successful. Use access_token as Bearer token.
          schema:
            allOf:
            - $ref: '#/definitions/httpresponse.Response'
            - properties:
                data:
                  $ref: '#/definitions/auth.LoginResponse'
              type: object
        "400":
          description: VALIDATION_ERROR | TURNSTILE_VERIFICATION_FAILED — email/password
            missing, or bot verification failed
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "401":
          description: INVALID_CREDENTIALS — email or password is incorrect
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "403":
          description: EMAIL_NOT_VERIFIED — account email is not yet verified
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "423":
          description: ACCOUNT_LOCKED — account is temporarily locked. Check meta.locked_until.
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "429":
          description: RATE_LIMITED — too many login attempts from this IP (separate
            from ACCOUNT_LOCKED). Check meta.retry_after_seconds.
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "500":
          description: INTERNAL_ERROR — unexpected server error
          schema:
            $ref: '#/definitions/httpresponse.Response'
      summary: Login
      tags:
      - Auth
  /v1/auth/logout:
    post:
      consumes:
      - application/json
      description: |-
        Terminates the CURRENT session: the provided `refresh_token` is revoked and can no longer
        be exchanged for new access tokens. The current access token simply expires on its own
        (≤15 minutes). Other devices/sessions stay logged in — use `/auth/logout-all` to revoke everything.

        Logout is idempotent: an already-expired refresh token still returns 200.
      parameters:
      - description: Refresh token of the session being terminated
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.LogoutRequestDTO'
      produces:
      - application/json
      responses:
        "200":
          description: Session terminated
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "400":
          description: VALIDATION_ERROR — refresh_token field is missing
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "401":
          description: UNAUTHORIZED | TOKEN_VERSION_MISMATCH — access token invalid,
            or refresh token belongs to another account
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "500":
          description: INTERNAL_ERROR — unexpected server error
          schema:
            $ref: '#/definitions/httpresponse.Response'
      security:
      - BearerAuth: []
      summary: Logout (this session)
      tags:
      - Auth
  /v1/auth/logout-all:
    post:
      description: |-
        Revokes EVERY session of the account by incrementing the internal token version.
        All previously issued access AND refresh tokens become invalid on their next use,
        including the one used to call this endpoint.
      produces:
      - application/json
      responses:
        "200":
          description: All sessions revoked
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "401":
          description: UNAUTHORIZED | TOKEN_VERSION_MISMATCH
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "500":
          description: INTERNAL_ERROR — unexpected server error
          schema:
            $ref: '#/definitions/httpresponse.Response'
      security:
      - BearerAuth: []
      summary: Logout from all devices
      tags:
      - Auth
  /v1/auth/refresh:
    post:
      consumes:
      - application/json
      description: |-
        Exchanges a valid `refresh_token` for a brand-new `access_token` + `refresh_token` pair.
        The presented refresh token is **rotated**: it is revoked immediately after the exchange
        and cannot be used a second time.

        Returns `TOKEN_VERSION_MISMATCH` when the session was revoked by logout-all or a
        password reset — the client must redirect the user to login.
      parameters:
      - description: Refresh token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RefreshTokenRequestDTO'
      produces:
      - application/json
      responses:
        "200":
          description: New token pair issued
          schema:
            allOf:
            - $ref: '#/definitions/httpresponse.Response'
            - properties:
                data:
                  $ref: '#/definitions/auth.RefreshTokenResponse'
              type: object
        "400":
          description: VALIDATION_ERROR — refresh_token field is missing
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "401":
          description: UNAUTHORIZED | TOKEN_VERSION_MISMATCH
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "500":
          description: INTERNAL_ERROR — unexpected server error
          schema:
            $ref: '#/definitions/httpresponse.Response'
      summary: Refresh session tokens
      tags:
      - Auth
  /v1/auth/register:
    post:
      consumes:
      - application/json
      description: |-
        Creates a new member account. If a valid `session_id` cookie from `/v1/guest-session`
        is present, the guest session data (display name, age, status, locale) is automatically
        linked to the new account — you do NOT need to re-submit that data here.

        After successful registration, a 6-digit OTP is sent to the provided email address.
        The account is not fully active until the OTP is verified via `/v1/auth/verify-email-otp`.

        **preferred_locale** — accepted values:
        - `en` — English
        - `id` — Indonesian (Bahasa Indonesia)

        **referral_code** — completely optional.
        If you do not have a referral code, omit the field, set it to `null`, or send `""` — all three are treated identically.

        **cf_turnstile_response** — required. The token returned by the Cloudflare Turnstile
        widget after the user completes the challenge.
      parameters:
      - description: Registration Data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterRequestDTO'
      produces:
      - application/json
      responses:
        "201":
          description: Account created. OTP sent to email. Verify via /auth/verify-email-otp.
          schema:
            allOf:
            - $ref: '#/definitions/httpresponse.Response'
            - properties:
                data:
                  $ref: '#/definitions/auth.RegisterResponse'
              type: object
        "400":
          description: VALIDATION_ERROR | EMAIL_ALREADY_REGISTERED | PASSWORD_TOO_SHORT
            | TURNSTILE_VERIFICATION_FAILED
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "409":
          description: EMAIL_ALREADY_REGISTERED — email is already in use
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "429":
          description: RATE_LIMITED — too many registration attempts from this IP.
            Check meta.retry_after_seconds.
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "500":
          description: INTERNAL_ERROR — unexpected server error
          schema:
            $ref: '#/definitions/httpresponse.Response'
      summary: Register a new user account
      tags:
      - Auth
  /v1/auth/resend-email-otp:
    post:
      consumes:
      - application/json
      description: |-
        Generates a new 6-digit OTP and sends it to the provided email address,
        invalidating any previously issued OTP for that address.

        **Rate limiting:**
        - There is a **60-second cooldown** between resend requests.
        - Maximum **5 resend requests per 24 hours** per email address.
        - When rate limited, the response includes `meta.retry_after_seconds` indicating how long to wait.

        For security reasons, this endpoint returns HTTP 200 regardless of whether the email
        address is registered, to prevent email enumeration attacks.
      parameters:
      - description: Email address to resend OTP to
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ResendEmailOTPRequestDTO'
      produces:
      - application/json
      responses:
        "200":
          description: OTP sent (or silently skipped if email is not registered)
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "400":
          description: VALIDATION_ERROR — email field is missing or invalid
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "429":
          description: RATE_LIMITED — cooldown active or daily limit reached. Check
            meta.retry_after_seconds.
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "500":
          description: INTERNAL_ERROR — unexpected server error
          schema:
            $ref: '#/definitions/httpresponse.Response'
      summary: Resend email verification OTP
      tags:
      - Auth
  /v1/auth/reset-password:
    post:
      consumes:
      - application/json
      description: |-
        Changes the account password using the single-use `reset_token` from `/auth/verify-reset-otp`.

        On success:
        - The `reset_token` is consumed permanently (replaying it returns 401).
        - ALL existing sessions on every device are revoked.
        - A fresh `access_token` + `refresh_token` pair is returned (auto-login).

        The new password follows the same policy as registration: minimum 10 characters and
        checked against known breach databases.
      parameters:
      - description: Reset token and new password
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ResetPasswordRequestDTO'
      produces:
      - application/json
      responses:
        "200":
          description: Password changed. New session issued.
          schema:
            allOf:
            - $ref: '#/definitions/httpresponse.Response'
            - properties:
                data:
                  $ref: '#/definitions/auth.ResetPasswordResponse'
              type: object
        "400":
          description: VALIDATION_ERROR | PASSWORD_TOO_SHORT | PASSWORD_BREACHED
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "401":
          description: UNAUTHORIZED — reset_token invalid, expired, or already used
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "500":
          description: INTERNAL_ERROR — unexpected server error
          schema:
            $ref: '#/definitions/httpresponse.Response'
      summary: Reset password (step 3 of 3)
      tags:
      - Auth
  /v1/auth/verify-email-otp:
    post:
      consumes:
      - application/json
      description: |-
        Verifies the 6-digit OTP sent to the user's email address after registration.
        The account is fully active only after this step succeeds.

        On success, a fresh `access_token` + `refresh_token` pair is returned (auto-login) —
        you already proved the password (at registration) and email ownership (this OTP),
        so a separate `/auth/login` call right after would be redundant.

        **Attempt limits:**
        - Maximum **5 wrong attempts** per OTP code. After that, you must request a new OTP.
        - Each failed attempt returns the remaining attempt count in the `meta.attempts_remaining` field.

        **OTP expiry:** OTP codes expire after 10 minutes. Request a new one via `/auth/resend-email-otp`.
      parameters:
      - description: Email and OTP code
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.VerifyEmailOTPRequestDTO'
      produces:
      - application/json
      responses:
        "200":
          description: Email verified. access_token/refresh_token issued (auto-login).
          schema:
            allOf:
            - $ref: '#/definitions/httpresponse.Response'
            - properties:
                data:
                  $ref: '#/definitions/auth.VerifyEmailOTPResponse'
              type: object
        "400":
          description: VALIDATION_ERROR | INVALID_OTP | OTP_EXPIRED
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "429":
          description: OTP_MAX_ATTEMPTS — maximum wrong attempts exceeded. Request
            a new OTP.
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "500":
          description: INTERNAL_ERROR — unexpected server error
          schema:
            $ref: '#/definitions/httpresponse.Response'
      summary: Verify email OTP
      tags:
      - Auth
  /v1/auth/verify-reset-otp:
    post:
      consumes:
      - application/json
      description: |-
        Exchanges a valid reset OTP for a short-lived (~15 minutes) single-use `reset_token`.
        Pass that token to `/auth/reset-password` to actually change the password.

        **Attempt limits:** maximum 5 wrong attempts per OTP; then a new code must be requested
        via `/auth/forgot-password`. Failed attempts return `meta.attempts_remaining`.
      parameters:
      - description: Email and reset OTP code
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.VerifyResetOTPRequestDTO'
      produces:
      - application/json
      responses:
        "200":
          description: reset_token issued (single-use, ~15 min)
          schema:
            allOf:
            - $ref: '#/definitions/httpresponse.Response'
            - properties:
                data:
                  $ref: '#/definitions/auth.VerifyResetOTPResponse'
              type: object
        "400":
          description: VALIDATION_ERROR | INVALID_OTP | OTP_EXPIRED
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "429":
          description: OTP_MAX_ATTEMPTS — request a new OTP via /auth/forgot-password
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "500":
          description: INTERNAL_ERROR — unexpected server error
          schema:
            $ref: '#/definitions/httpresponse.Response'
      summary: Verify password reset OTP (step 2 of 3)
      tags:
      - Auth
  /v1/guest-session:
    post:
      consumes:
      - application/json
      description: |-
        Starts an anonymous onboarding session before the user registers an account.
        Sets a `session_id` HttpOnly cookie that is automatically carried through to `/auth/register`
        to link the guest session to the new account.

        **status** — accepted values:
        - `student`    — currently studying at school or university
        - `worker`     — employed full-time or part-time
        - `freelancer` — self-employed / project-based work
        - `unemployed` — not currently working
        - `other`      — anything that does not fit the options above

        **locale** — accepted values:
        - `en` — English (UI labels and email content will be in English)
        - `id` — Indonesian (UI labels and email content will be in Bahasa Indonesia)
      parameters:
      - description: Guest Session Onboarding Data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateGuestSessionRequestDTO'
      produces:
      - application/json
      responses:
        "201":
          description: Guest session created. session_id cookie is set.
          schema:
            allOf:
            - $ref: '#/definitions/httpresponse.Response'
            - properties:
                data:
                  $ref: '#/definitions/auth.CreateGuestSessionResponse'
              type: object
        "400":
          description: VALIDATION_ERROR — one or more fields are missing or have an
            invalid value (e.g., unrecognised status or locale)
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "500":
          description: INTERNAL_ERROR — unexpected server error
          schema:
            $ref: '#/definitions/httpresponse.Response'
      summary: Create a guest session
      tags:
      - Auth
  /v1/questions:
    get:
      description: Returns the full SJT/Likert/Essay question bank translated to the
        negotiated locale.
      parameters:
      - description: Overrides the negotiated locale for this request (en|id)
        in: query
        name: locale
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Question bank
          schema:
            allOf:
            - $ref: '#/definitions/httpresponse.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/assessment.QuestionResponse'
                  type: array
              type: object
        "500":
          description: INTERNAL_ERROR — unexpected server error
          schema:
            $ref: '#/definitions/httpresponse.Response'
      summary: Get the question bank
      tags:
      - Assessment
  /v1/results/{id}:
    get:
      description: |-
        Optional auth. Anyone holding the result's (unguessable) ID can view it.
        `is_owner` tells the frontend whether to render owner-only affordances.
      parameters:
      - description: Test result ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Test result detail
          schema:
            allOf:
            - $ref: '#/definitions/httpresponse.Response'
            - properties:
                data:
                  $ref: '#/definitions/assessment.ResultResponse'
              type: object
        "404":
          description: RESULT_NOT_FOUND
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "500":
          description: INTERNAL_ERROR — unexpected server error
          schema:
            $ref: '#/definitions/httpresponse.Response'
      summary: Get a test result
      tags:
      - Result
  /v1/results/{id}/mascot-style:
    patch:
      consumes:
      - application/json
      description: Owner only. Purely visual — never affects trait_scores/grit_score/ai_summary_text.
      parameters:
      - description: Test result ID
        in: path
        name: id
        required: true
        type: string
      - description: style_a or style_b
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateMascotStyleRequestDTO'
      produces:
      - application/json
      responses:
        "200":
          description: Updated result
          schema:
            allOf:
            - $ref: '#/definitions/httpresponse.Response'
            - properties:
                data:
                  $ref: '#/definitions/assessment.ResultResponse'
              type: object
        "400":
          description: VALIDATION_ERROR — mascot_style must be style_a or style_b
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "403":
          description: FORBIDDEN — caller does not own this result
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "404":
          description: RESULT_NOT_FOUND
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "500":
          description: INTERNAL_ERROR — unexpected server error
          schema:
            $ref: '#/definitions/httpresponse.Response'
      summary: Choose a mascot visual variant
      tags:
      - Result
  /v1/results/{id}/pdf:
    get:
      description: Owner only. Redirects (302) to a short-lived signed URL once the
        PDF is ready.
      parameters:
      - description: Test result ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "302":
          description: Redirect to signed PDF URL
          schema:
            type: string
        "403":
          description: FORBIDDEN — caller does not own this result
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "404":
          description: RESULT_NOT_FOUND
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "409":
          description: PDF_NOT_READY — generation hasn't completed yet
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "500":
          description: INTERNAL_ERROR — unexpected server error
          schema:
            $ref: '#/definitions/httpresponse.Response'
      summary: Download the generated PDF
      tags:
      - Result
  /v1/results/{id}/pdf-status:
    get:
      description: |-
        Owner only. Frontend polls with exponential backoff (2s→4s→8s→cap 10s, ~90s total);
        `failed` means stop polling immediately.
      parameters:
      - description: Test result ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: pending|processing|completed|failed
          schema:
            allOf:
            - $ref: '#/definitions/httpresponse.Response'
            - properties:
                data:
                  $ref: '#/definitions/assessment.PDFStatusResponse'
              type: object
        "403":
          description: FORBIDDEN — caller does not own this result
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "404":
          description: RESULT_NOT_FOUND
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "500":
          description: INTERNAL_ERROR — unexpected server error
          schema:
            $ref: '#/definitions/httpresponse.Response'
      summary: Poll PDF generation status
      tags:
      - Result
  /v1/user-dashboard:
    get:
      description: |-
        Member's personal dashboard: remaining monthly quota (derived on-the-fly) and recent GRIT trend.
        This is the USER (Member) dashboard — not an admin dashboard; this API has no admin concept.
      produces:
      - application/json
      responses:
        "200":
          description: Dashboard summary
          schema:
            allOf:
            - $ref: '#/definitions/httpresponse.Response'
            - properties:
                data:
                  $ref: '#/definitions/dashboard.DashboardResponse'
              type: object
        "401":
          description: UNAUTHORIZED | TOKEN_VERSION_MISMATCH
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "500":
          description: INTERNAL_ERROR — unexpected server error
          schema:
            $ref: '#/definitions/httpresponse.Response'
      security:
      - BearerAuth: []
      summary: Get user dashboard summary
      tags:
      - User Dashboard
  /v1/user-dashboard/history:
    get:
      description: Ordered newest-first.
      parameters:
      - description: Page number, 1-indexed (default 1)
        in: query
        name: page
        type: integer
      - description: Results per page, max 50 (default 10)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: History page
          schema:
            allOf:
            - $ref: '#/definitions/httpresponse.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/dashboard.HistoryItem'
                  type: array
                meta:
                  $ref: '#/definitions/dashboard.PaginationMeta'
              type: object
        "401":
          description: UNAUTHORIZED | TOKEN_VERSION_MISMATCH
          schema:
            $ref: '#/definitions/httpresponse.Response'
        "500":
          description: INTERNAL_ERROR — unexpected server error
          schema:
            $ref: '#/definitions/httpresponse.Response'
      security:
      - BearerAuth: []
      summary: Get paginated test-result history
      tags:
      - User Dashboard
securityDefinitions:
  BearerAuth:
    description: Masukkan access token tanpa prefix "Bearer ", cukup token JWT-nya
      saja.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
