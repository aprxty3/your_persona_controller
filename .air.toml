root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -buildvcs=false -o ./tmp/api ./cmd/api"
  bin = "./tmp/api"
  full_bin = ""
  include_ext = ["go", "toml", "yaml", "yml", "env", "tpl", "tmpl", "html", "json"]
  exclude_dir = ["assets", "tmp", "vendor", "docs", "docker", ".github"]
  delay = 1000
  stop_on_error = true
  send_interrupt = true
  kill_delay = 500
  poll = true

[log]
  time = true