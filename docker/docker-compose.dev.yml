services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    command: ["air", "-c", ".air.toml"]
    volumes:
      - ..:/app

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    command: ["air", "-c", ".air.worker.toml"]
    volumes:
      - ..:/app
  mailpit:
    image: axllent/mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
