services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    command: ["air", "-c", ".air.toml"]
    volumes:
      - ..:/app

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    command: ["air", "-c", ".air.worker.toml"]
    volumes:
      - ..:/app

  # S3-compatible storage untuk dev — kode client S3 yang sama jalan di sini dan di AWS S3 asli
  # (tinggal ganti S3_ENDPOINT di .env, lihat PRD Section 9.4)
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # SMTP catcher untuk dev — lihat email yang "terkirim" di http://localhost:8025
  mailpit:
    image: axllent/mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  minio_data:
