services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    command: ["air", "-c", ".air.toml"]
    volumes:
      - ..:/app

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    command: ["air", "-c", ".air.worker.toml"]
    environment:
      - SMTP_HOST=mailpit
    volumes:
      - ..:/app
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # SMTP catcher for dev — view "sent" emails at http://localhost:8025
  mailpit:
    image: axllent/mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  minio_data:
