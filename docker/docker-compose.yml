name: your-persona

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["./api"]
    ports:
      - "8080:8080"
    env_file:
      - ../.env
    environment:
      - DB_HOST=postgres
      - REDIS_HOST=redis
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["./worker"]
    env_file:
      - ../.env
    environment:
      - REDIS_HOST=redis
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-psyche_assessment}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
