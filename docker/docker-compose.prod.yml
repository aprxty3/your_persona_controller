name: your-persona-prod

# Fixed subnet (instead of Docker's auto-assigned default bridge range) so
# TRUSTED_PROXIES in .env.prod can be set once, in advance, without needing to
# `docker network inspect` after the VPS is actually provisioned. Caddy is the
# only container-to-container hop in front of `api`, so this /16 covering the
# whole compose network is deliberately generous rather than pinning Caddy's
# exact IP — that IP isn't guaranteed stable across container recreation.
networks:
  default:
    ipam:
      config:
        - subnet: 172.28.0.0/16

services:
  api:
    image: ghcr.io/aprxty3/your_persona_controller:${CONTROLLER_API_IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["./api"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    env_file:
      - ../.env
    environment:
      - DB_HOST=postgres
      - REDIS_HOST=redis
    depends_on:
      - postgres
      - redis

  worker:
    image: ghcr.io/aprxty3/your_persona_controller:${CONTROLLER_API_IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["./worker"]
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - DB_HOST=postgres
      - REDIS_HOST=redis
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
