version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    # Core correctness
    - errcheck
    - govet
    - ineffassign
    - staticcheck # merger of stylecheck + gosimple + old staticcheck
    - unused
    # Bug prevention relevant for this stack (HTTP client to Gemini/S3, DB, worker)
    - bodyclose # HTTP response body (Gemini API, S3) must be closed
    - contextcheck # correct context propagation, important for graceful shutdown & Gemini timeout
    - noctx # prevent HTTP requests without context
    - copyloopvar # Go 1.22+ loop variable check
    - errorlint # consistent error wrapping (see NFR error handling in PRD)
    - nilerr
    - sqlclosecheck
    - rowserrcheck
    - unparam
    # Security
    - gosec
    # Code quality
    - misspell
    - goconst # repeated status strings ("completed", "fallback_static") must be const
    - revive
    # Architecture — automatic enforcement of AGENTS.md Architecture Rules
    - depguard
  settings:
    gosec:
      config:
        global:
          "#nosec": "#nosec-reviewed" # explicit reason required each time suppressing, not plain #nosec
    errcheck:
      check-type-assertions: true
    goconst:
      min-occurrences: 3
    depguard:
      rules:
        # Domain layer must be framework-agnostic — dependency rule of Clean Architecture
        # enforced here, not just in AGENTS.md documentation
        domain-layer:
          files:
            - "**/internal/domain/**"
          deny:
            - pkg: "gorm.io"
              desc: "domain layer must be framework-agnostic — place GORM in internal/infrastructure/persistence (see AGENTS.md Architecture Rules)"
            - pkg: "net/http"
              desc: "domain layer must not know about HTTP — that is handled by internal/interfaces/http"
            - pkg: "github.com/hibiken/asynq"
              desc: "domain layer must not know about Asynq — that is handled by internal/interfaces/worker"
            - pkg: "google.golang.org/genai"
              desc: "domain layer must not know about Gemini SDK — that is handled by internal/infrastructure/gemini"
        # Prevent deprecated io/ioutil, and math/rand non-crypto used for sensitive operations
        general:
          files:
            - "$all"
          deny:
            - pkg: "io/ioutil"
              desc: "deprecated since Go 1.16 — use 'io' or 'os'"

formatters:
  enable:
    - gofmt
    - goimports

issues:
  exclude-dirs:
    - docs
    - tmp
