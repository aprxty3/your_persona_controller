root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/worker ./cmd/worker"
  bin = "./tmp/worker"
  full_bin = ""
  include_ext = ["go", "tpl", "tmpl", "html", "json"]
  exclude_dir = ["assets", "tmp", "vendor", "docs", "docker", ".github"]
  delay = 1000
  stop_on_error = true
  send_interrupt = true
  kill_delay = 500

[log]
  time = true