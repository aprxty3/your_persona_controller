name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # requires full history so gitleaks scans all commits, not just HEAD
      - name: gitleaks (secret scanning)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          # go.mod targets go 1.25.0 — prebuilt golangci-lint releases lag behind new Go
          # versions and refuse to run against a newer `go` directive. Building from source
          # with the runner's own toolchain (set above) always matches, avoiding that skew.
          install-mode: goinstall

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: Run tests
        run: go test ./... -race -cover

  security:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: govulncheck (dependency vulnerabilities)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
      - name: gosec (static security analysis)
        uses: securego/gosec@master
        with:
          args: ./...

  build:
    runs-on: ubuntu-latest
    needs: [test, security, secrets]
    steps:
      - uses: actions/checkout@v4
      - name: Build image (verify Dockerfile is valid, do not push)
        run: docker build -t controller-api:${{ github.sha }} -f docker/Dockerfile .
