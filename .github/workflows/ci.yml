name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # requires full history so gitleaks scans all commits, not just HEAD
      - name: gitleaks (secret scanning)
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: "1.25"
          cache: true
      - name: Install golangci-lint v2
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.1.6
      - name: golangci-lint
        run: golangci-lint run

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: "1.25"
          cache: true
      - name: Run unit tests
        run: go test ./... -race -cover

  integration:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: "1.25"
          cache: true
      - name: Run integration tests
        run: go test ./... -race -p 1 -tags=integration -cover

  security:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: "1.25"
          cache: true
      - name: govulncheck (dependency vulnerabilities)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
          govulncheck ./...
      - name: gosec (static security analysis)
        uses: securego/gosec@v2.28.0
        with:
          args: ./...

  build:
    runs-on: ubuntu-latest
    needs: [test, integration, security, secrets]
    permissions:
      contents: read
      packages: write
    outputs:
      image_sha_tag: ${{ steps.image.outputs.name }}:sha-${{ github.sha }}
    steps:
      - uses: actions/checkout@v7
      - name: Compute lowercase image name
        id: image
        run: echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract image tags/labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image (push only on branch pushes, never on PRs)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    env:
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
    steps:
      - name: SSH deploy — pull & recreate (mirrors docs/deploy_runbook.md §5)
        if: env.VPS_SSH_KEY != ''
        uses: appleboy/ssh-action@v1
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image_sha_tag }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          envs: IMAGE_TAG
          script: |
            set -euo pipefail
            cd /opt/your-persona/controller-api
            git fetch origin main
            git reset --hard origin/main
            export CONTROLLER_API_IMAGE_TAG="$IMAGE_TAG"
            docker compose -f docker/docker-compose.prod.yml --env-file .env pull
            docker compose -f docker/docker-compose.prod.yml --env-file .env up -d --no-build --remove-orphans
            docker image prune -f
      - name: Smoke test
        if: env.VPS_SSH_KEY != ''
        run: |
          curl -fsS --retry 5 --retry-delay 3 --retry-connrefused \
            https://api.yourpersonas.com/healthz
