version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      go-dependencies:
        update-types: ["minor", "patch"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        update-types: ["minor", "patch"]

  # Dockerfile base images (oven/bun, postgres, redis, caddy — see docker/).
  - package-ecosystem: "docker"
    directories:
      - "/docker"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      docker-base-images:
        update-types: ["minor", "patch"]
